<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Void Blaster FPS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hud">
  <span>Score: <span id="score">0</span></span>
  <span>Health: <span id="health">100</span></span>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
