<!DOCTYPE html>

<head>

  <title>Memory Defense Simulator</title>

<h1>Memory Defense Simulator</h1>
<p>Survive by accessing memory correctly.</p>

<pre id="status"></pre>

<script type="module" src="main.js"></script>
</body>
