<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Void Blaster</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>VOID BLASTER</h1>
<p>Move: A/D or ◀ ▶ | Shoot: Space | Pause: P</p>

<div id="game">
  <div id="player"></div>
  <div id="pauseOverlay">PAUSED</div>
</div>

<div class="hud">
  <span>Score: <span id="score">0</span></span>
  <span>Lives: <span id="lives">3</span></span>
  <span>Wave: <span id="wave">1</span></span>
</div>

<button onclick="startGame()">Start / Restart</button>

<script src="script.js"></script>
</body>
</html>
